name: batch-fetch-prices

on:
    # Schedule disabled for now — uncomment when ready to run automatically.
    # GitHub Actions cron is best-effort: expect 5–15 min delay under load.
    # schedule:
    #     - cron: "0 */6 * * *"  # every 6 hours, aligned with check_frequency_minutes=360
    workflow_dispatch:
        inputs:
            log_level:
                description: "Log level for this run"
                required: false
                default: "INFO"
                type: choice
                options: [DEBUG, INFO, WARNING, ERROR]

concurrency:
    group: batch-fetch-prices
    cancel-in-progress: false

jobs:
    fetch:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            APP_ENV: production
            LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}
            PYTHONUNBUFFERED: "1"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Setup Python
              run: uv python install 3.12

            - name: Sync dependencies
              run: uv sync --frozen

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('uv.lock') }}

            - name: Install Playwright Chromium
              run: |
                  if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
                      uv run playwright install-deps chromium
                  else
                      uv run playwright install --with-deps chromium
                  fi

            - name: Run batch fetch
              run: uv run python -m travel_data_platform.workers.batch_fetch_prices

            - name: Upload debug artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: debug-${{ github.run_id }}-${{ github.run_attempt }}
                  path: debug/
                  if-no-files-found: ignore
                  retention-days: 7
